<!DOCTYPE html>
<html lang="$lang$" data-theme="dark">
<head>
  $partial("templates/partials/head.html")$
</head>
<body>
  $partial("templates/partials/nav.html")$
  <div class="timeline">
    <!-- Timeline navigation (left sidebar / top on mobile) -->
    <nav class="timeline-nav" aria-label="Year navigation">
      $for(yearGroups)$
      <a href="#$year$" class="timeline-year" data-year="$year$">$year$</a>
      $endfor$
    </nav>

    <!-- Scrollable post list -->
    <div class="timeline-content">
      <div class="tag-filter" id="tag-filter" style="display: none;">
        <span class="tag-filter-label"></span>
        <button class="tag-filter-clear" aria-label="Clear filter">&times;</button>
      </div>
      <ul class="timeline-posts">
        $for(yearGroups)$
        $for(posts)$
        <li class="timeline-post" data-year="$dateYear$" data-tags="$tagsStr$">
          <a href="$url$">
            <span class="timeline-post-title">$title$</span>
            <span class="timeline-post-date">$dateShort$</span>
          </a>
        </li>
        $endfor$
        $endfor$
      </ul>
    </div>
  </div>
  $partial("templates/partials/footer.html")$
  <script src="/js/theme.js"></script>
  <script src="/js/nav.js"></script>
  <script src="/js/timeline.js"></script>
</body>
</html>
