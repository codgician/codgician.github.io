name: builder
version: 0.1.0.0
github: "codgician/codgician.github.io"
license: MIT
author: "codgician"
maintainer: "codgician"
copyright: "2025 codgician"
extra-source-files:
  - README.md
  - CHANGELOG.md
  - static/scss/*.scss
description: Static site generator for codgician.me
ghc-options:
  - -Werror
  - -Wall
  - -Wcompat
  - -Widentities
  - -Wredundant-constraints
  - -Wincomplete-record-updates
  - -Wincomplete-uni-patterns
  - -Wpartial-fields
  - -Wmissing-export-lists
  - -Wmissing-home-modules
  - -Wunused-packages
  - -Wunused-type-patterns
  - -Wduplicate-exports
  - -Wmissing-signatures
library:
  source-dirs: src
  exposed-modules:
    - Compiler.ArtifactCache
    - Compiler.HakyllRecovery
    - Compiler.RenderContext
    - Compiler.RenderEnvironment
    - Compiler.KaTeX
    - Compiler.Mermaid
    - Compiler.Pandoc
    - Compiler.TikZ
    - Compiler.Toc
    - Config
    - Content.Fallback
    - Content.Metadata
    - Content.Types
    - Context
    - Feed
    - Paginate
    - Routes
    - Rules.Feeds
    - Rules.Pages
    - Rules.Posts
    - Rules.Sitemap
    - Rules.Slides
    - Rules.Static
    - Site
  dependencies:
    - base >= 4.7 && < 5
    - hakyll >= 4.16
    - pandoc >= 3.0
    - pandoc-types >= 1.23
    - skylighting
    - text
    - filepath
    - directory
    - process
    - yaml
    - aeson
    - time
    - containers
    - cryptohash-sha256
    - base16-bytestring
    - bytestring
    - temporary
executables:
  site:
    main: Main.hs
    source-dirs: app
    ghc-options:
      - -threaded
      - -rtsopts
      - -with-rtsopts=-N
    dependencies:
      - base >= 4.7 && < 5
      - builder
tests:
  builder-test:
    main: Spec.hs
    source-dirs: test
    ghc-options:
      - -threaded
      - -rtsopts
      - -with-rtsopts=-N
    dependencies:
      - base >= 4.7 && < 5
      - builder
      - hakyll >= 4.16
      - hspec
      - containers
      - aeson
      - text
      - bytestring
      - directory
      - filepath
      - pandoc-types >= 1.23
      - temporary
