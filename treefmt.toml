on-unmatched = "debug"

[formatter.haskell]
command = "ormolu"
includes = ["*.hs"]

[formatter.nix]
command = "nixfmt"
options = []
includes = [ "*.nix" ]
excludes = []

[formatter.yaml]
command = "yamlfmt"
includes = [ "*.yaml", "*.yml" ]

[formatter.markdown]
command = "prettier"
options = ["--prose-wrap", "preserve", "--write"]
includes = ["*.md"]
excludes = ["content/slides/**/*.md"]  # Slides use Pandoc fenced divs unsupported by prettier